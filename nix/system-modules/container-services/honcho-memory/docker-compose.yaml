---
name: honcho-memory
services:
  api:
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 10s
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()
      timeout: 5s
    image: ghcr.io/plastic-labs/honcho:latest
    ports:
      - 8000:8000
    restart: unless-stopped
  deriver:
    depends_on:
      api:
        condition: service_healthy
    entrypoint:
      - /app/.venv/bin/python
      - -m
      - src.deriver
    image: ghcr.io/plastic-labs/honcho:latest
    restart: unless-stopped
