---
# Regenerate podman-compose.nix with: compose2nix -i docker-compose.yml -o podman-compose.nix
# Bind-mount paths are overridden in default.nix from services.hermes-agent.stateDir.
name: hermes-webui
services:
  hermes-webui:
    container_name: hermes-webui
    environment:
      HERMES_WEBUI_GATEWAY_BASE_URL: http://127.0.0.1:8642
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
    hostname: hermes-webui
    image: ghcr.io/nesquena/hermes-webui:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./hermes-agent/.hermes:/home/hermeswebui/.hermes:rw
      - ./hermes-agent/current-package:/home/hermeswebui/.hermes/hermes-agent:ro
      - ./hermes-agent/workspace:/workspace:rw
